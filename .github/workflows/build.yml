name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK inside Isolated Container
    runs-on: ubuntu-latest
    # 🎯 اصلاح تگ کانتینر از master به latest برای دانلود موفقیت‌آمیز
    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # تمام پیش‌نیازها درون این ایمیج آماده هستند و مستقیماً وارد فاز بیلد می‌شویم
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonScanner-APK
          path: bin/*.apk
