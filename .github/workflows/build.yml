name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK inside Isolated Container
    runs-on: ubuntu-latest
    # 🎯 استفاده از محیط رسمی و پیش‌ساخته بیلدوزر جهت مهار ۱۰۰٪ تداخل‌های لینوکس میزبان
    container:
      image: ghcr.io/kivy/buildozer:master

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # در این ایمیج، تمام ابزارها، جاوا، پایتون و وابستگی‌ها از قبل در بالاترین سطح پایداری نصب هستند
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonScanner-APK
          path: bin/*.apk
