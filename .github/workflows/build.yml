name: Build Android APK

# اجرای کاملاً دستی با کلیک روی دکمه Run workflow در تب Actions
on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK using Buildozer
    # استفاده از جدیدترین و قدرتمندترین نسخه سرور اوبونتو
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # تنظیم جاوا ۱۷ که پیش‌نیاز رسمی اندروید SDKهای جدید است
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # تنظیم پایتون ۳.۱۱ سازگار با بیلدوزر و کیوی
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # نصب تمام وابستگی‌های مدرن لینوکس اوبونتو ۲۴.۰۴ (شامل libtinfo6 و ابزارهای کامپایلر NDK)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-virtualenv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev automake autopoint gettext
          pip install --upgrade pip
          pip install --upgrade buildozer cython virtualenv

      # تزریق از پیش‌ساخته‌ی هش لایسنس‌های گوگل برای عبور ۱۰۰٪ تضمینی از موافقت‌نامه‌ها بدون یخ زدن سرور
      - name: Inject Android SDK Licenses
        run: |
          mkdir -p .buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > .buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > .buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      # اجرای استاندارد و تمیز دستور بیلد (بدون yes | برای جلوگیری از خطای Broken Pipe تداخل نسخه‌ها)
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      # استخراج فایل APK تولید شده و آماده‌سازی آن برای دانلود مستقیم شما
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonScanner-v0.0.1-APK
          path: bin/*.apk
