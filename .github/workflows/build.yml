name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK using Buildozer
    # حفظ جدیدترین نسخه سرور گیت‌هاب (اوبونتو ۲۴.۰۴) طبق دستور شما
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-virtualenv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev automake autopoint gettext gcc-13 g++-13
          pip install --upgrade pip
          pip install --upgrade buildozer setuptools wheel cython virtualenv

      # 🎯 راهکار حرفه‌ای: تغییر سیستم‌عامل میزبان به استفاده از GCC 13 جهت مهار خطاهای سخت‌گیرانه GCC 14
      - name: Configure GCC 13 as default host compiler
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 --slave /usr/bin/g++ g++ /usr/bin/g++-13
          sudo update-alternatives --set gcc /usr/bin/gcc-13

      - name: Inject Android SDK Licenses
        run: |
          mkdir -p .buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > .buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > .buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonScanner-APK
          path: bin/*.apk
