name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK using Buildozer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # نصب پیش‌نیازهای سیستم‌عامل
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-virtualenv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev automake autopoint gettext
          pip install --upgrade pip
          pip install --upgrade buildozer setuptools wheel cython virtualenv

      # 🎯 راهکار حرفه‌ای و استاندارد گوگل: موافقت با تمام لایسنس‌های جدید و قدیم اندروید از طریق ابزار رسمی sdkmanager
      - name: Auto-accept ALL Android SDK Licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      # اجرای بیلدوزر با مهار تداخل‌های NDK سرور
      - name: Build APK with Buildozer
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
          ANDROID_NDK: ""
          APP_CFLAGS: "-Wno-error=incompatible-pointer-types -Wno-error=implicit-function-declaration"
        run: |
          buildozer -v android debug

      # آپلود فایل نهایی برای دانلود شما
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonScanner-APK
          path: bin/*.apk
